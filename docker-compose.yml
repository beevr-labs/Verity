# BeevR for Legal — single-tenant in-boundary stack (doc 20 §1–3).
# Components (doc 20 §2): app/api · Postgres (vector+FTS+graph+audit) ·
# MinIO (immutable originals, WORM) · one-shot migration runner (doc 20 §5.1).
#
# EGRESS-DENY AT THE NETWORK LAYER (doc 16 §1 layer (a)):
#   `beevr_internal` is `internal: true` — containers on it have NO route out.
#   Only the app also joins `edge` to accept browser traffic. The app itself
#   has no outbound client except the disabled escalation path (layer (b),
#   proven by scripts/egress_proof.py / TC-501).
#
#   docker compose up -d
#   # browse http://localhost:8777

services:
  app:
    build: .
    environment:
      DATABASE_URL: postgresql://beevr:${POSTGRES_PASSWORD:-beevr-dev-only}@db:5432/beevr
      OBJECT_STORE_URL: http://minio:9000
      # zero egress by default: no frontier endpoint configured (FR-SE-01)
      FRONTIER_ENDPOINT: ""
    ports:
      - "8777:8777"          # in-boundary only; TLS terminates at the customer proxy
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [beevr_internal, edge]
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: beevr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beevr-dev-only}
      POSTGRES_DB: beevr
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beevr -d beevr"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [beevr_internal]
    restart: unless-stopped

  # One-shot, fail-closed migration runner (doc 20 §5.1): applies
  # db/migrations/*.sql in order, then exits. The app only starts after it
  # completes successfully (see depends_on above).
  migrate:
    image: pgvector/pgvector:pg16
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        until pg_isready -h db -U beevr -d beevr; do sleep 1; done
        for f in /migrations/*.sql; do
          echo "applying $$f"
          psql -h db -U beevr -d beevr -v ON_ERROR_STOP=1 -f "$$f"
        done
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-beevr-dev-only}
    volumes:
      - ./db/migrations:/migrations:ro
    depends_on:
      db:
        condition: service_healthy
    networks: [beevr_internal]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: beevr
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-beevr-dev-only}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [beevr_internal]
    restart: unless-stopped

networks:
  # internal: true == no outbound route from this network (egress-deny, SEC-1)
  beevr_internal:
    internal: true
  edge: {}

volumes:
  pgdata: {}
  miniodata: {}
